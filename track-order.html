<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta name="viewport" 
      content="width=device-width, 
               initial-scale=1.0,
               maximum-scale=5.0">

    <script src="/data.js"></script>
    <meta charset="UTF-8">
    <title>تتبع طلبك | Heru</title>
    <meta property="og:site_name" content="Heru">
    <meta property="og:locale" content="ar_EG">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" as="style">
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" as="style">

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="/settings.js"></script>

<style>
/* Hide Google Translate toolbar completely */
.goog-te-banner-frame { display: none !important; }
.goog-te-menu-value { display: none !important; }
#goog-gt-tt { display: none !important; }
.goog-tooltip { display: none !important; }
body { top: 0 !important; }
.skiptranslate { display: none !important; }

/* Protect design from translation */
[data-notranslate] { 
  font-family: inherit !important; 
}
.navbar-logo { 
  font-family: inherit !important;
}

#theme-toggle-btn:hover, #lang-toggle-btn:hover {
  border-color: var(--accent) !important;
}
#lang-toggle-btn:hover {
  color: var(--accent) !important;
}
</style>

<div id="google_translate_element" style="display:none; visibility:hidden; position:absolute;"></div>

</head>
<body class="page-enter">

    <div id="toast-container" class="toast-container"></div>

    <!-- Navbar -->
    <nav class="navbar">
        <a href="/" class="nav-brand" data-store-name>Heru</a>
        <ul class="nav-links">
            <li><a href="/">الرئيسية</a></li>
            <li><a href="/shop.html">المتجر</a></li>
            <li><a href="/track-order.html" class="active">تتبع طلبي</a></li>
        </ul>
        <div class="nav-actions">
            <button id="theme-toggle-btn" 
                    onclick="toggleTheme()"
                    class="navbar-icon-btn"
                    aria-label="تبديل الوضع"
                    style="background:none; border:1px solid var(--border);
                           border-radius:8px; padding:8px;
                           cursor:pointer; color:var(--text-primary);
                           display:flex; align-items:center;
                           justify-content:center; width:38px; height:38px;
                           transition:all 200ms;">
            </button>
            <button id="lang-toggle-btn"
                    onclick="toggleLanguage()"
                    class="navbar-icon-btn"
                    style="background:none; 
                           border:1px solid var(--border);
                           border-radius:8px; 
                           padding:0 10px;
                           cursor:pointer; 
                           color:var(--text-primary);
                           font-family:'Space Grotesk',sans-serif;
                           font-size:13px; font-weight:700;
                           height:38px; min-width:38px;
                           letter-spacing:0.5px;
                           transition:all 200ms;">
              AR
            </button>
            <a href="/cart.html" class="icon-btn cart-trigger" title="السلة">
                <i data-lucide="shopping-cart"></i>
                <span class="cart-badge hidden">0</span>
            </a>
            <button class="icon-btn hamburger" onclick="document.getElementById('mobileMenu').classList.add('open')">
                <i data-lucide="menu"></i>
            </button>
        </div>
    </nav>
    <div class="mobile-menu" id="mobileMenu">
        <button class="icon-btn" onclick="document.getElementById('mobileMenu').classList.remove('open')" style="align-self: flex-end;">
            <i data-lucide="x"></i>
        </button>
        <div style="display: flex; flex-direction: column; gap: var(--space-6); font-size: var(--text-xl); font-weight: 700;">
            <a href="/" style="color: var(--text-primary); text-decoration: none;">الرئيسية</a>
            <a href="/shop.html" style="color: var(--text-primary); text-decoration: none;">المتجر</a>
            <a href="/track-order.html" style="color: var(--accent); text-decoration: none;">تتبع طلبي</a>
        </div>
    </div>

    <!-- MAIN TRACK ORDER CONTAINER -->
    <main class="container" id="track-root" style="margin-block-start: var(--space-8); min-height: 70vh; max-width: 680px;">
        <div id="track-form-view" class="text-center page-enter">
            <div style="margin-block-end: var(--space-6); color: var(--accent); display:flex; justify-content:center;">
                <i data-lucide="package" style="width: 64px; height: 64px;"></i>
            </div>
            <h1 style="font-size: var(--text-3xl); margin-block-end: var(--space-2);">تتبع طلبك</h1>
            <p style="color: var(--text-secondary); margin-block-end: var(--space-8);">ادخل رقم طلبك ورقم تليفونك اللي اشتريت بيه</p>
            
            <form id="track-form" onsubmit="event.preventDefault(); window.submitTracking();" style="text-align: right;">
                <div style="margin-block-end: var(--space-4);">
                    <label style="display: block; margin-block-end: var(--space-2); font-weight: 700;">رقم الطلب*</label>
                    <input type="text" id="track-order-id" class="form-input" placeholder="مثال: ORD-2025-0001" required>
                </div>
                
                <div style="margin-block-end: var(--space-6);">
                    <label style="display: block; margin-block-end: var(--space-2); font-weight: 700;">رقم الهاتف*</label>
                    <input type="tel" id="track-phone" class="form-input en-text" placeholder="01xxxxxxxxx" required pattern="^01[0125][0-9]{8}$" title="يجب أن يكون رقم موبايل مصري صحيح (11 رقم يبدأ بـ 01)">
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%;">تتبع الطلب</button>
            </form>
        </div>
        
        <div id="track-result-view" style="display: none;"></div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-grid">
                <div>
                    <div class="footer-brand" data-store-name>Heru</div>
                    <p class="footer-tagline" data-tagline>منتجات فنية بطابع شبابي لشباب مصر.</p>
                </div>
                <div>
                    <h4 class="footer-title">روابط سريعة</h4>
                    <ul class="footer-links">
                        <li><a href="/">الرئيسية</a></li>
                        <li><a href="/shop.html">المتجر</a></li>
                    </ul>
                </div>
                <div>
                    <h4 class="footer-title">معلومات</h4>
                    <ul class="footer-links">
                        <li><a href="/privacy">سياسة الخصوصية</a></li>
                        <li><a href="/terms">شروط الاستخدام</a></li>
                    </ul>
                </div>
            </div>
            <div class="footer-bottom">
                <div>© <span class="en-text">2026</span> <span data-store-name>Heru</span>. جميع الحقوق محفوظة</div>
            
                <div class="footer-socials">
  <a id="social-instagram"
     data-social="instagram"
     href="#" 
     target="_blank" 
     rel="noopener noreferrer"
     aria-label="Instagram"
     style="display:none">
    <svg width="20" height="20" viewBox="0 0 24 24"
         fill="none" stroke="currentColor" stroke-width="2">
      <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
      <circle cx="12" cy="12" r="4"/>
      <circle cx="17.5" cy="6.5" r="1.5" fill="currentColor" 
              stroke="none"/>
    </svg>
  </a>
  
  <a id="social-tiktok"
     data-social="tiktok"
     href="#"
     target="_blank"
     rel="noopener noreferrer"
     aria-label="TikTok"
     style="display:none">
    <svg width="20" height="20" viewBox="0 0 24 24"
         fill="currentColor">
      <path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67
               a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89
               2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1V9.01
               a6.33 6.33 0 0 0-.79-.05 6.34 6.34 0 0 0-6.34 6.34
               6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.33-6.34
               V8.69a8.18 8.18 0 0 0 4.78 1.52V6.76
               a4.85 4.85 0 0 1-1.01-.07z"/>
    </svg>
  </a>
  
  <a id="social-facebook"
     data-social="facebook"
     href="#"
     target="_blank"
     rel="noopener noreferrer"
     aria-label="Facebook"
     style="display:none">
    <svg width="20" height="20" viewBox="0 0 24 24"
         fill="none" stroke="currentColor" stroke-width="2">
      <path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7
               a1 1 0 0 1 1-1h3z"/>
    </svg>
  </a>
</div>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
<script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
</html>
