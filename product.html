    <script>
    document.addEventListener('DOMContentLoaded', function() {
      const params = new URLSearchParams(window.location.search)
      const id = params.get('id')
      
      if (!id) {
        window.location.href = '/shop'
        return
      }
      
      const product = getProductById(id)
      
      if (!product) {
        document.getElementById('product-root').innerHTML = `
          <div class="not-found">
            <h2>المنتج غير موجود</h2>
            <a href="/shop">تصفح المتجر</a>
          </div>
        `
        return
      }
      
      // Render all product details
      renderProductPage(product)
      
      // Render similar products
      const similar = getProductsByCategory(product.category)
        .filter(p => p.id !== product.id)
        .slice(0, 4)
      
      const simGrid = document.getElementById('similar-products')
      if (simGrid) {
        simGrid.innerHTML = similar.map(p => renderProductCard(p)).join('')
        attachCardEvents()
      }
      
      // Render reviews
      const reviews = getReviews()
        .filter(r => r.product_id === id && r.is_approved)
      renderProductReviews(reviews, product)
    })
    </script>
